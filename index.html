<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>healthscience.network | The Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nature.css">
    <script type="module" src="js/app.js"></script>
</head>
<body class="dark-mode">
    <div id="app">
        <hs-hub-navigator id="hub"></hs-hub-navigator>
        
        <main id="lens-container">
            <hs-lens-emulation id="emulation" class="lens"></hs-lens-emulation>
            <hs-lens-poetry id="poetry" class="lens"></hs-lens-poetry>
            <hs-lens-skeleton id="skeleton" class="lens"></hs-lens-skeleton>
            <hs-lens-roadmap id="roadmap" class="lens"></hs-lens-roadmap>
            <hs-lens-explorer id="explorer" class="lens"></hs-lens-explorer>
            <hs-hop-diagram id="hop-diagram" class="lens"></hs-hop-diagram>
            <hs-playground id="playground" class="lens"></hs-playground>
            <hs-coherence-ledger id="coherence-ledger" class="lens"></hs-coherence-ledger>
            <hs-besearch id="besearch" class="lens"></hs-besearch>
            <hs-resonagents id="resonagents" class="lens"></hs-resonagents>
            <hs-library id="library" class="lens"></hs-library>
            <hs-ptop-storage id="ptop-storage" class="lens"></hs-ptop-storage>
            <hs-cue-currency id="cue-currency" class="lens"></hs-cue-currency>
            <hs-safeflow-ecs id="safeflow-ecs" class="lens"></hs-safeflow-ecs>
            <hs-consilience-weave id="consilience-weave" class="lens"></hs-consilience-weave>
            <hs-beebee id="beebee" class="lens"></hs-beebee>
            <hs-heli-section id="heli" class="lens"></hs-heli-section>
            <hs-glossary id="glossary" class="lens"></hs-glossary>
            <hs-maths id="maths" class="lens"></hs-maths>
        </main>
    </div>

    <!-- Template for lenses if needed, or we define them in JS -->
</body>
</html>
